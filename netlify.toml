[build]
  # Install both backend and frontend dependencies, then build the frontend
  command = "npm install --prefix backend && cd 'frontend/financial web' && npm install && npm run build"
  publish = "frontend/financial web/dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"
  # Ensures that the backend folder (with your models/index.js) is included in the zip
  external_node_modules = ["express", "mongoose", "serverless-http"]
  included_files = ["backend/**"]
